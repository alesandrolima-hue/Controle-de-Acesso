<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Controle de Acesso</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Controle de Acesso</h1>

<label>Nome</label>
<input id="nome" type="text">

<label>Matrícula</label>
<input id="matricula" type="text">

<label>Empresa</label>
<input id="empresa" type="text">

<label>Sala</label>

<select id="sala">

<option value="">Selecione</option>

<option>11B2</option>
<option>13B2</option>
<option>15B2</option>
<option>17B2</option>
<option>19B2</option>

</select>

<label>Tipo</label>

<select id="tipo">

<option>Entrada</option>

<option>Saída</option>

</select>

<label>Motivo</label>

<textarea id="motivo"></textarea>

<label>Foto do Ambiente</label>

<input
    type="file"
    id="foto"
    accept="image/*"
    capture="environment">

<br><br>

<img
    id="previewFoto"
    style="display:none;
           max-width:100%;
           border-radius:8px;
           border:1px solid #ccc;">  
  
<label>Assinatura</label>

<canvas id="assinatura" width="450" height="180"></canvas>

<br><br>

<button type="button" onclick="limparAssinatura()">
Limpar Assinatura
</button>

<br><br>

<button onclick="enviar()">
Enviar
</button>  
  
</div>

<script src="script.js"></script>

</body>

</html>
